<!DOCTYPE html>
<html>
<head>
<title>Memory Flip Game - Party!</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #f0f0f0;
  overflow-x: hidden;
  position: relative;
}

h2 { margin-top: 20px; }

.game {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 80px;
  height: 80px;
  background: #333;
  color: white;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 10px;
  transition: transform 0.3s;
}

.flipped {
  background: #4CAF50;
  transform: rotateY(180deg);
}

#completionMessage {
  font-size: 40px;
  font-weight: bold;
  margin-top: 20px;
  display: none;
  animation: bounceColor 1s infinite alternate;
  color: red;
  text-shadow: 2px 2px #fff, -2px -2px #000, 2px -2px #ff0, -2px 2px #0ff;
}

@keyframes bounceColor {
  0% { transform: scale(0.8) rotate(-10deg); color:#ff0055; }
  25% { transform: scale(1.2) rotate(10deg); color:#00ffcc; }
  50% { transform: scale(1.1) rotate(-15deg); color:#ffdd00; }
  75% { transform: scale(1.3) rotate(15deg); color:#ff00ff; }
  100% { transform: scale(1.2) rotate(-10deg); color:#00ccff; }
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background-color: red;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(600px) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<h2>🧠 Memory Flip Game</h2>
<p>Moves: <span id="moves">0</span></p>

<div class="game" id="game"></div>
<p id="completionMessage">🎉 Game Completed! 🎊</p>
<img id="gif.mp4" src=""C:\Users\MEGHANA\OneDrive\Desktop\game\gif.mp4"" style="display:none; width:200px; margin-top:20px;">

<script>
// Memory Flip Game Logic
let symbols = ["🍎","🍌","🍇","🍉","🍒","🍍","🥝","🍓"];
let cards = [...symbols, ...symbols];
cards.sort(() => 0.5 - Math.random());

let game = document.getElementById("game");
let first = null;
let second = null;
let lock = false;
let moves = 0;
let matchedCount = 0;

// Confetti creator
function createConfetti(){
  for(let i=0;i<50;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*window.innerWidth + "px";
    c.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
    c.style.animationDuration = (Math.random()*2+3)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

cards.forEach((symbol, index) => {
  let div = document.createElement("div");
  div.className = "card";
  div.dataset.symbol = symbol;
  div.dataset.index = index;

  div.onclick = function() {
    if(lock || div.classList.contains("flipped")) return;

    div.innerText = symbol;
    div.classList.add("flipped");

    if(!first){
      first = div;
    } else {
      second = div;
      moves++;
      document.getElementById("moves").innerText = moves;

      if(first.dataset.symbol === second.dataset.symbol){
        matchedCount +=2;
        first = null;
        second = null;

        if(matchedCount === cards.length){
          let msg = document.getElementById("completionMessage");
          msg.style.display = "block";   // Show crazy text
          let gif = document.getElementById("celebrationGif");
          gif.style.display = "block";   // Show GIF
          createConfetti();
          setInterval(createConfetti, 500); // continuous confetti
        }
      } else {
        lock = true;
        setTimeout(() => {
          first.innerText = "";
          second.innerText = "";
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          first = null;
          second = null;
          lock = false;
        }, 800);
      }
    }
  };

  game.appendChild(div);
});
</script>

</body>
</html>
